<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Perfil - MentorX</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-setup {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .user-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .radio-option input[type="radio"] {
            width: auto;
            margin: 0;
        }
        .subject-grade-group {
            display: none;
            margin-top: 15px;
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
        }
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body class="dark-mode">

<main class="profile-setup">
    <div class="profile-header">
        <div class="user-avatar-large">
            <i class="fas fa-user"></i>
        </div>
        <h1>Complete seu Perfil</h1>
        <p>Para continuar, precisamos de algumas informações adicionais</p>
    </div>

    <div id="message" class="message"></div>

    <form id="profileForm">
        <div class="form-group">
            <label for="firstname">Nome</label>
            <input type="text" id="firstname" required>
        </div>

        <div class="form-group">
            <label for="lastname">Sobrenome</label>
            <input type="text" id="lastname" required>
        </div>

        <div class="form-group">
            <label>Tipo de Conta</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="professor" name="userType" value="professor" required>
                    <label for="professor">👨‍🏫 Professor</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="aluno" name="userType" value="aluno" required>
                    <label for="aluno">👨‍🎓 Aluno</label>
                </div>
            </div>
        </div>

        <div id="subject-group" class="form-group subject-grade-group">
            <label for="subject">Matéria que leciona</label>
            <select id="subject">
                <option value="">Selecione uma matéria</option>
                <option value="matematica">Matemática</option>
                <option value="fisica">Física</option>
                <option value="quimica">Química</option>
                <option value="programacao">Programação</option>
                <option value="eletronica">Eletrônica</option>
                <option value="telecomunicacoes">Telecomunicações</option>
                <option value="engenharia">Engenharia</option>
                <option value="outra">Outra</option>
            </select>
        </div>

        <div id="grade-group" class="form-group subject-grade-group">
            <label for="grade">Ano/Série</label>
            <select id="grade">
                <option value="">Selecione seu ano</option>
                <option value="fundamental1">Ensino Fundamental I</option>
                <option value="fundamental2">Ensino Fundamental II</option>
                <option value="medio">Ensino Médio</option>
                <option value="tecnico">Ensino Técnico</option>
                <option value="superior">Ensino Superior</option>
                <option value="pos">Pós-graduação</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Salvar e Continuar</button>
    </form>
</main>

<script type="module">
    // Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyC9z9z9z9z9z9z9z9z9z9z9z9z9z9z9z9z9",
        authDomain: "mentorx-c28fd.firebaseapp.com",
        projectId: "mentorx-c28fd",
        storageBucket: "mentorx-c28fd.firebasestorage.app",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let currentUser = null;

    // Check authentication state
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadExistingData(user);
        } else {
            window.location.href = 'login.html';
        }
    });

    function loadExistingData(user) {
        const userData = JSON.parse(localStorage.getItem(`user_${user.uid}`) || '{}');

        // Pre-fill form with existing data
        if (userData.name) {
            const nameParts = userData.name.split(' ');
            document.getElementById('firstname').value = nameParts[0] || '';
            document.getElementById('lastname').value = nameParts.slice(1).join(' ') || '';
        } else if (user.displayName) {
            const nameParts = user.displayName.split(' ');
            document.getElementById('firstname').value = nameParts[0] || '';
            document.getElementById('lastname').value = nameParts.slice(1).join(' ') || '';
        }

        if (userData.userType) {
            document.getElementById(userData.userType).checked = true;
            toggleUserTypeFields(userData.userType);

            if (userData.userType === 'professor' && userData.subject) {
                document.getElementById('subject').value = userData.subject;
            } else if (userData.userType === 'aluno' && userData.grade) {
                document.getElementById('grade').value = userData.grade;
            }
        }
    }

    // Form handling
    document.getElementById('profileForm').addEventListener('submit', handleProfileSubmit);

    // Radio button change handlers
    document.querySelectorAll('input[name="userType"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            toggleUserTypeFields(e.target.value);
        });
    });

    function toggleUserTypeFields(userType) {
        const subjectGroup = document.getElementById('subject-group');
        const gradeGroup = document.getElementById('grade-group');

        if (userType === 'professor') {
            subjectGroup.style.display = 'block';
            gradeGroup.style.display = 'none';
        } else if (userType === 'aluno') {
            gradeGroup.style.display = 'block';
            subjectGroup.style.display = 'none';
        } else {
            subjectGroup.style.display = 'none';
            gradeGroup.style.display = 'none';
        }
    }

    async function handleProfileSubmit(e) {
        e.preventDefault();

        if (!currentUser) {
            showMessage('Erro: usuário não autenticado', 'error');
            return;
        }

        const formData = {
            firstname: document.getElementById('firstname').value.trim(),
            lastname: document.getElementById('lastname').value.trim(),
            userType: document.querySelector('input[name="userType"]:checked')?.value,
            subject: document.getElementById('subject').value,
            grade: document.getElementById('grade').value
        };

        // Validation
        if (!formData.firstname || !formData.lastname) {
            showMessage('Nome e sobrenome são obrigatórios', 'error');
            return;
        }

        if (!formData.userType) {
            showMessage('Selecione o tipo de conta', 'error');
            return;
        }

        if (formData.userType === 'professor' && !formData.subject) {
            showMessage('Selecione a matéria que leciona', 'error');
            return;
        }

        if (formData.userType === 'aluno' && !formData.grade) {
            showMessage('Selecione seu ano/série', 'error');
            return;
        }

        try {
            // Update user profile data
            const userData = {
                uid: currentUser.uid,
                name: `${formData.firstname} ${formData.lastname}`,
                email: currentUser.email,
                userType: formData.userType,
                subject: formData.subject || null,
                grade: formData.grade || null,
                createdAt: new Date().toISOString(),
                provider: 'google',
                photoURL: currentUser.photoURL,
                profileCompleted: true
            };

            localStorage.setItem(`user_${currentUser.uid}`, JSON.stringify(userData));

            showMessage('Perfil atualizado com sucesso! Redirecionando...', 'success');

            setTimeout(() => {
                if (formData.userType === 'professor') {
                    window.location.href = 'mentorx_admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }, 1500);

        } catch (error) {
            console.error('Erro ao salvar perfil:', error);
            showMessage('Erro ao salvar perfil. Tente novamente.', 'error');
        }
    }

    function showMessage(message, type) {
        const messageEl = document.getElementById('message');
        messageEl.textContent = message;
        messageEl.className = `message ${type}`;
        messageEl.style.display = 'block';

        setTimeout(() => {
            messageEl.style.display = 'none';
        }, 5000);
    }
</script>

</body>
</html>
